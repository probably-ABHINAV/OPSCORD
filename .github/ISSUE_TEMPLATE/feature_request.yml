name: "\U0001F4A1 Feature Request"
description: Suggest an idea for OPSCORD
title: '[FEAT]: '
labels: ['enhancement', 'triage']
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in improving OPSCORD! Please fill out the template below.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.

  - type: checkboxes
    id: claim
    attributes:
      label: Would you like to work on this feature?
      description: Let us know if you want to submit a PR for this!
      options:
        - label: 'Yes, I would like to submit a PR for this feature.'
        - label: 'No, I am just requesting it.'
