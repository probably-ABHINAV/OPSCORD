# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# OPSCORD — PR Quality Guard
# Anti-spam + quality enforcement on PRs
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: PR Quality Guard

on:
  pull_request_target:
    types: [opened, edited]

permissions:
  pull-requests: write
  issues: read

jobs:
  guard:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - name: Check PR body for linked issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            // Check for issue link patterns
            const hasIssueLink = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#\d+/i.test(body)
              || /#\d+/.test(body);

            if (!hasIssueLink) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `👋 Hey @${pr.user.login}!\n\nThis PR doesn't appear to link to an issue. Please:\n1. Make sure you're assigned to an issue first\n2. Add \`Closes #<issue-number>\` to your PR description\n\nPRs without linked issues will not be reviewed. See our [Contributing Guide](CONTRIBUTING.md) for details.`
              });
            }

      - name: Check for whitespace-only changes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const allWhitespace = files.every(f =>
              f.changes <= 2 && f.additions <= 1 && f.deletions <= 1
            );

            if (allWhitespace && files.length <= 2) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['spam']
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `🚫 This PR appears to contain only whitespace or trivial changes and has been flagged as **spam**.\n\nIf this is a mistake, please update the PR with substantive changes. Otherwise, it will be closed.`
              });
            }
