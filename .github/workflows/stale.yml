# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# OPSCORD — Stale Issue/PR Management
# Automatically marks inactive issues and PRs
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Stale Bot

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            👋 This issue has been automatically marked as **stale** because it has had
            no activity for 7 days. It will be closed in 3 days if no further activity occurs.

            If you're still working on this, please comment to keep it open.
          stale-pr-message: >
            👋 This PR has been automatically marked as **stale** because it has had
            no activity for 5 days. It will be closed in 3 days if no further activity occurs.

            If you need more time, please comment to keep it open.
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          days-before-issue-stale: 7
          days-before-pr-stale: 5
          days-before-issue-close: 3
          days-before-pr-close: 3
          exempt-issue-labels: 'priority:high,mentor-approved'
          exempt-pr-labels: 'priority:high'
